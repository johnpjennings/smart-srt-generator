<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>smart-srt-generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css?v=20260307d" />
  </head>
  <body>
    <main class="shell">
      <h1>smart-srt-generator</h1>

      <section class="card">
        <h2>1) Upload MP3</h2>
        <form id="mp3-form">
          <input id="audio_file" name="audio_file" type="file" accept=".mp3,audio/mpeg" required />
          <div class="constraints-row">
            <label>
              Max Characters per subtitle
              <input id="srt_max_chars" name="srt_max_chars" type="number" min="10" step="1" value="50" />
            </label>
            <label>
              Max seconds per subtitle
              <input id="srt_max_seconds" name="srt_max_seconds" type="number" min="0.5" step="0.1" value="4.0" />
            </label>
          </div>
          <button type="submit" id="upload-btn">Run Whisper</button>
        </form>
      </section>

      <section class="card">
        <h2>2) Submit Script</h2>
        <form id="script-form">
          <textarea id="script" name="script" placeholder="Paste script here..." required></textarea>
          <button type="submit">Submit Script</button>
        </form>
      </section>

      <section class="card">
        <h2>3) SRT Output</h2>
        <p id="status">Idle</p>
        <div id="loading-indicator" class="loading-indicator" aria-hidden="true">
          <span class="spinner" aria-hidden="true"></span>
          <span>Transcription in process. This may take a few minutes depending on the length of the audio.</span>
        </div>
        <textarea id="srt-output" placeholder="Whisper SRT will appear here. You can edit it directly."></textarea>
        <div class="manual-row">
          <button type="button" id="split-btn">Split</button>
          <button type="button" id="merge-btn">Merge</button>
          <button type="button" id="remove-gaps-btn">Remove Gaps</button>
          <button type="button" id="download-srt-btn">Download SRT</button>
        </div>
      </section>
    </main>

    <script src="/app.js?v=20260307e"></script>
  </body>
</html>
